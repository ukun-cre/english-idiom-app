<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Idiom Quiz</title>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
</head>
<body>
    <header>
        <h1>Welcome to the English Idiom Quiz</h1>
    </header>
    <main>
        <section id="stage-selection">
            <h2>Select a Stage</h2>
            <select id="stage-select">
                <option value="0">Stage 1</option>
                <option value="1">Stage 2</option>
                <option value="2">Stage 3</option>
                <option value="3">Stage 4</option>
                <option value="4">Stage 5</option>
            </select>
            <button id="start-quiz">Start Quiz</button>
        </section>
        <section id="quiz-interface" style="display:none;">
            <h2>Quiz</h2>
            <div id="quiz-questions"></div>
            <button id="submit-answers">Submit Answers</button>
        </section>
        <section id="progress-tracking" style="display:none;">
            <h2>Your Progress</h2>
            <div id="progress-bar" style="width: 0%; height: 20px; background-color: green;"></div>
            <span id="current-question">Question 1 of N</span>
        </section>
        <section id="result-display" style="display:none;">
            <h2>Your Results</h2>
            <p id="result-message"></p>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 English Idiom Quiz</p>
    </footer>
</body>
</html>
